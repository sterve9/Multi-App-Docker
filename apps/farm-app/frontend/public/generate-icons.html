<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<script>
// Génère les icônes Farm Manager en canvas et les télécharge
function generateIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Fond vert foncé
  ctx.fillStyle = '#065f46';
  const r = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Feuille simple
  const cx = size / 2;
  const cy = size / 2;
  const s = size * 0.28;

  ctx.fillStyle = '#34d399';
  ctx.beginPath();
  ctx.ellipse(cx - s * 0.1, cy - s * 0.1, s * 1.1, s * 0.65, -Math.PI / 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#065f46';
  ctx.lineWidth = size * 0.03;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx + s * 0.7, cy + s * 0.7);
  ctx.quadraticCurveTo(cx, cy, cx - s * 0.8, cy - s * 0.8);
  ctx.stroke();

  const link = document.createElement('a');
  link.download = `icon-${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
generateIcon(192);
setTimeout(() => generateIcon(512), 500);
</script>
<p>Les icônes sont générées automatiquement. Placez icon-192.png et icon-512.png dans ce dossier /public/</p>
</body>
</html>
