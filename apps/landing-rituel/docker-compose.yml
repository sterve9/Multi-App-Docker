services:
  landing-rituel:
    build: .
    container_name: landing-rituel
    restart: unless-stopped
    networks:
      - traefik-network
    labels:
      # ── Traefik ──
      - "traefik.enable=true"

      # Remplace "rituel.myfurbrush.com" par ton sous-domaine réel
      - "traefik.http.routers.landing-rituel.rule=Host(`rituel.sterveshop.cloud`)"
      - "traefik.http.routers.landing-rituel.entrypoints=websecure"
      - "traefik.http.routers.landing-rituel.tls=true"
      - "traefik.http.routers.landing-rituel.tls.certresolver=letsencrypt"

      # Redirection HTTP → HTTPS
      - "traefik.http.routers.landing-rituel-http.rule=Host(`rituel.sterveshop.cloud`)"
      - "traefik.http.routers.landing-rituel-http.entrypoints=web"
      - "traefik.http.routers.landing-rituel-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"

      - "traefik.http.services.landing-rituel.loadbalancer.server.port=80"

networks:
  traefik-network:
    external: true
