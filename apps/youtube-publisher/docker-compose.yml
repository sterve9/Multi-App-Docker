services:
  backend:
    build: ./backend
    container_name: youtube-publisher-backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@youtube-db:5432/youtube_publisher
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - KIE_AI_API_KEY=${KIE_AI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - BASE_URL=${BASE_URL:-https://api.youtube.sterveshop.cloud}
      - AFFILIATE_LINK=${AFFILIATE_LINK:-https://myfurbrush.com/rituelancestral7jours}
      - REMOTION_SERVICE_URL=http://youtube-remotion-renderer:3001
      - DEBUG=${DEBUG:-False}
    depends_on:
      postgres:
        condition: service_healthy
      remotion:
        condition: service_healthy
    networks:
      - traefik-network
      - internal
    volumes:
      - video_outputs:/app/outputs
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      - "traefik.http.routers.youtube-api.rule=Host(`api.youtube.sterveshop.cloud`)"
      - "traefik.http.routers.youtube-api.entrypoints=websecure"
      - "traefik.http.routers.youtube-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.youtube-api.loadbalancer.server.port=8000"
      - "traefik.http.routers.youtube-api-http.rule=Host(`api.youtube.sterveshop.cloud`)"
      - "traefik.http.routers.youtube-api-http.entrypoints=web"
      - "traefik.http.routers.youtube-api-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  remotion:
    build: ./remotion
    container_name: youtube-remotion-renderer
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - video_outputs:/app/outputs
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.youtube.sterveshop.cloud
    container_name: youtube-publisher-frontend
    restart: unless-stopped
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      - "traefik.http.routers.youtube-app.rule=Host(`app.youtube.sterveshop.cloud`)"
      - "traefik.http.routers.youtube-app.entrypoints=websecure"
      - "traefik.http.routers.youtube-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.youtube-app.loadbalancer.server.port=3000"
      - "traefik.http.routers.youtube-app-http.rule=Host(`app.youtube.sterveshop.cloud`)"
      - "traefik.http.routers.youtube-app-http.entrypoints=web"
      - "traefik.http.routers.youtube-app-http.middlewares=redirect-to-https"

  postgres:
    image: postgres:15
    container_name: youtube-publisher-postgres
    hostname: youtube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: youtube_publisher
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d youtube_publisher"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  traefik-network:
    external: true
  internal:
    internal: true

volumes:
  postgres_data:
  video_outputs:
