services:
  sterve-agency:
    build: .
    container_name: sterve-agency
    restart: unless-stopped
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      - "traefik.http.routers.sterve-agency.rule=Host(`sterveshop.cloud`)"
      - "traefik.http.routers.sterve-agency.entrypoints=websecure"
      - "traefik.http.routers.sterve-agency.tls=true"
      - "traefik.http.routers.sterve-agency.tls.certresolver=letsencrypt"
      - "traefik.http.services.sterve-agency.loadbalancer.server.port=80"
      # HTTP → HTTPS
      - "traefik.http.routers.sterve-agency-http.rule=Host(`sterveshop.cloud`)"
      - "traefik.http.routers.sterve-agency-http.entrypoints=web"
      - "traefik.http.routers.sterve-agency-http.middlewares=agency-redirect-https"
      - "traefik.http.middlewares.agency-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.agency-redirect-https.redirectscheme.permanent=true"

networks:
  traefik-network:
    external: true
