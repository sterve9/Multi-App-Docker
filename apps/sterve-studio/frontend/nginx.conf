server {
    listen 80;

    # Proxy /api/* → backend (strip /api prefix)
    location /api/ {
        proxy_pass http://sterve-studio-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50M;
    }

    # Proxy /uploads/* → backend
    location /uploads/ {
        proxy_pass http://sterve-studio-backend:8000/uploads/;
        proxy_set_header Host $host;
    }

    # Frontend — serve index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
