services:
  sterve-studio-backend:
    build: ./backend
    container_name: sterve-studio-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - UPLOAD_DIR=/uploads
      - PUBLIC_BASE=https://tools.sterveshop.cloud
    volumes:
      - studio-data:/data
      - studio-uploads:/uploads
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"

      # API routes — /api/* stripped to /* before hitting backend
      - "traefik.http.routers.studio-api.rule=Host(`tools.sterveshop.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.studio-api.priority=20"
      - "traefik.http.routers.studio-api.entrypoints=websecure"
      - "traefik.http.routers.studio-api.tls=true"
      - "traefik.http.routers.studio-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.studio-api.middlewares=studio-strip-api"
      - "traefik.http.middlewares.studio-strip-api.stripprefix.prefixes=/api"
      - "traefik.http.services.studio-api.loadbalancer.server.port=8000"

      # /uploads served directly by backend (StaticFiles mount)
      - "traefik.http.routers.studio-uploads.rule=Host(`tools.sterveshop.cloud`) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.studio-uploads.priority=20"
      - "traefik.http.routers.studio-uploads.entrypoints=websecure"
      - "traefik.http.routers.studio-uploads.tls=true"
      - "traefik.http.routers.studio-uploads.tls.certresolver=letsencrypt"
      - "traefik.http.services.studio-uploads.loadbalancer.server.port=8000"

  sterve-studio-frontend:
    build: ./frontend
    container_name: sterve-studio-frontend
    restart: unless-stopped
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"

      # Main frontend — catches everything else on the domain
      - "traefik.http.routers.studio-frontend.rule=Host(`tools.sterveshop.cloud`)"
      - "traefik.http.routers.studio-frontend.entrypoints=websecure"
      - "traefik.http.routers.studio-frontend.tls=true"
      - "traefik.http.routers.studio-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.studio-frontend.loadbalancer.server.port=80"

      # HTTP → HTTPS redirect
      - "traefik.http.routers.studio-http.rule=Host(`tools.sterveshop.cloud`)"
      - "traefik.http.routers.studio-http.entrypoints=web"
      - "traefik.http.routers.studio-http.middlewares=studio-redirect-https"
      - "traefik.http.middlewares.studio-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.studio-redirect-https.redirectscheme.permanent=true"

volumes:
  studio-data:
  studio-uploads:

networks:
  traefik-network:
    external: true
