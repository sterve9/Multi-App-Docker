services:
  sterve-studio-backend:
    build: ./backend
    container_name: sterve-studio-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - UPLOAD_DIR=/uploads
      - PUBLIC_BASE=https://tools.sterveshop.cloud
    volumes:
      - studio-data:/data
      - studio-uploads:/uploads
    networks:
      - studio-internal

  sterve-studio-frontend:
    build: ./frontend
    container_name: sterve-studio-frontend
    restart: unless-stopped
    depends_on:
      - sterve-studio-backend
    networks:
      - traefik-network
      - studio-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.studio.rule=Host(`tools.sterveshop.cloud`)"
      - "traefik.http.routers.studio.entrypoints=websecure"
      - "traefik.http.routers.studio.tls=true"
      - "traefik.http.routers.studio.tls.certresolver=letsencrypt"
      - "traefik.http.services.studio.loadbalancer.server.port=80"
      # HTTP → HTTPS
      - "traefik.http.routers.studio-http.rule=Host(`tools.sterveshop.cloud`)"
      - "traefik.http.routers.studio-http.entrypoints=web"
      - "traefik.http.routers.studio-http.middlewares=studio-redirect-https"
      - "traefik.http.middlewares.studio-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.studio-redirect-https.redirectscheme.permanent=true"

volumes:
  studio-data:
  studio-uploads:

networks:
  studio-internal:
  traefik-network:
    external: true
